<style>
:root{--red:#d8121a;--red-d:#a60d13;--ink:#15171a;--paper:#f4f1ea;--paper2:#fbf9f4;--line:#e0dccf;--muted:#8b9098;--ok:#1f9d55;--warn:#c97a00;--field:#fff;--txt:#1a1c1f;--soft:#5a6068;--sky:#0284c7;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:"Barlow","PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;background:#0d0f12;color:var(--txt);line-height:1.45;padding-bottom:110px;}
.screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;}
#loginScreen{background:radial-gradient(ellipse at 50% 30%,#0c2340,#050810);}
#loadScreen{background:radial-gradient(ellipse at 50% 30%,#0c2340,#050810);flex-direction:column;gap:14px;}
.spin{width:40px;height:40px;border:3px solid #1e3a5f;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{color:#7dd3fc;font-size:14px;}
/* LOGIN */
.login-box{background:rgba(10,20,35,.85);backdrop-filter:blur(12px);border:1px solid rgba(125,211,252,.2);border-radius:22px;padding:34px 28px 28px;width:330px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.login-logo{text-align:center;margin-bottom:24px;}
.logo-fish{width:72px;height:72px;margin:0 auto 10px;display:block;}
.login-logo h1{font-family:"Barlow Condensed";font-size:26px;color:#fff;font-weight:700;letter-spacing:1px;}
.login-logo p{font-size:12px;color:#7dd3fc;margin-top:3px;opacity:.8;}
.login-fld{display:block;margin-bottom:12px;}
.login-fld span{display:block;font-size:11.5px;font-weight:600;color:#7dd3fc;margin-bottom:4px;}
.login-fld input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(125,211,252,.25);border-radius:9px;padding:11px 13px;color:#fff;font-family:inherit;font-size:15px;outline:none;transition:.15s;}
.login-fld input:focus{border-color:#38bdf8;background:rgba(255,255,255,.1);}
.login-btn{width:100%;background:linear-gradient(180deg,var(--sky),#0369a1);border:none;border-radius:10px;padding:13px;color:#fff;font-family:"Barlow Condensed";font-weight:700;font-size:18px;letter-spacing:.5px;cursor:pointer;box-shadow:0 4px 0 #024e7c,0 6px 20px rgba(2,132,199,.4);margin-top:4px;transition:.08s;}
.login-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #024e7c;}
.login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.login-err{color:#fca5a5;font-size:13px;text-align:center;margin-top:9px;min-height:18px;}
/* MAIN */
.wrap{max-width:760px;margin:0 auto;}
header{background:linear-gradient(180deg,#0a1628,#0d1b30);border-bottom:2px solid #0ea5e9;padding:10px 14px;position:sticky;top:0;z-index:40;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.brand{display:flex;align-items:center;gap:9px;}
.hfish{width:34px;height:34px;flex:none;}
.brand h1{font-family:"Barlow Condensed";font-size:22px;color:#fff;font-weight:700;flex:1;letter-spacing:.5px;}
.ubadge{display:flex;align-items:center;gap:6px;background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.3);border-radius:20px;padding:5px 10px;}
.ubadge span{font-size:12px;color:#bae6fd;}
.ubadge b{color:#fff;font-size:12px;}
.rtag{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;}
.r-admin{background:rgba(220,38,38,.25);color:#fca5a5;}
.r-rep{background:rgba(14,165,233,.25);color:#7dd3fc;}
.r-trial{background:rgba(245,158,11,.2);color:#fcd34d;}
.lout{border:none;background:transparent;color:#7dd3fc;font-size:19px;cursor:pointer;padding:2px 4px;}
/* SECTIONS */
section{background:var(--paper);margin:9px;border-radius:13px;box-shadow:0 3px 0 rgba(0,0,0,.25),0 6px 20px rgba(0,0,0,.22);overflow:hidden;}
.sh{display:flex;align-items:center;gap:9px;padding:11px 14px;background:linear-gradient(180deg,#fff,#efece4);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;}
.sn{font-family:"Barlow Condensed";font-weight:700;font-size:13px;color:#fff;background:var(--ink);width:23px;height:23px;border-radius:5px;display:grid;place-items:center;flex:none;}
.sh h2{margin:0;font-size:15px;font-weight:700;flex:1;}
.chev{color:var(--muted);font-size:12px;transition:transform .2s;}
section.collapsed .chev{transform:rotate(-90deg);}
section.collapsed .sec-body{display:none;}
.sec-body{padding:12px 14px;}
/* FIELDS */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid .full{grid-column:1/-1;}
label.fld{display:block;}
label.fld span{display:block;font-size:11px;font-weight:600;color:var(--soft);margin:0 0 3px 2px;}
input,select,textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--field);border:1.5px solid #d8d3c6;border-radius:8px;padding:8px 10px;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(2,132,199,.1);}
textarea{resize:vertical;min-height:44px;}
.hint{font-size:12px;color:var(--soft);margin-bottom:9px;}
.trow{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:9px;}
.sw{position:relative;width:40px;height:23px;flex:none;}
.sw input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer;}
.sw .sl{position:absolute;inset:0;background:#cfc9bb;border-radius:20px;transition:.18s;}
.sw .kn{position:absolute;top:3px;left:3px;width:17px;height:17px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.sw input:checked~.sl{background:var(--sky);}
.sw input:checked~.kn{transform:translateX(17px);}
/* SEARCH */
.sbox{position:relative;}
.sbox input{font-size:15px;padding-left:34px;}
.sic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;}
.res{margin-top:7px;max-height:300px;overflow-y:auto;border-radius:8px;}
.ri{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--paper2);border:1px solid #e6e1d4;border-radius:8px;margin-bottom:5px;cursor:pointer;transition:.1s;}
.ri:hover{border-color:var(--sky);background:#fff;}
.ri:active{transform:scale(.99);}
.rm{flex:1;min-width:0;}
.rmod{font-family:"Barlow Condensed";font-weight:700;font-size:14px;letter-spacing:.3px;}
.rid{font-size:10px;color:#fff;background:var(--muted);border-radius:3px;padding:1px 5px;margin-left:5px;}
.rname{font-size:12px;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rprice{font-size:11px;color:var(--soft);margin-top:2px;}
.rprice b{color:var(--sky);font-weight:700;}
.rprice .ref{color:#6a9;font-size:10.5px;}
.radd{font-size:21px;color:var(--sky);flex:none;width:26px;text-align:center;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
/* CART */
.line{background:var(--paper2);border:1px solid #e6e1d4;border-radius:10px;padding:9px 10px;margin-bottom:8px;}
.ltop{display:flex;gap:7px;align-items:flex-start;}
.ltop .linfo{flex:1;min-width:0;}
.lmod{font-family:"Barlow Condensed";font-weight:700;font-size:14px;}
.lnm{font-size:11.5px;color:var(--soft);}
.del{flex:none;border:none;background:#ece5d8;color:#b22;border-radius:6px;width:27px;height:27px;font-size:15px;cursor:pointer;}
.ctrl{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:flex-end;}
.qty{display:flex;align-items:center;border:1.5px solid #d8d3c6;border-radius:7px;overflow:hidden;background:#fff;}
.qty button{border:none;background:#efe9dc;width:30px;height:34px;font-size:18px;font-weight:700;cursor:pointer;}
.qty button:active{background:var(--sky);color:#fff;}
.qty input{width:42px;text-align:center;border:none;border-radius:0;border-left:1px solid #e2ddd0;border-right:1px solid #e2ddd0;font-weight:700;padding:6px 2px;}
.mini{display:flex;flex-direction:column;}
.mini>span{font-size:10px;font-weight:600;color:var(--soft);margin-bottom:3px;}
.mini select,.mini input{padding:6px 7px;font-size:13px;}
.uin{width:50px;}.pin{width:88px;font-weight:700;font-family:"Barlow Condensed";}.ssel{width:88px;}
.lsub{margin-left:auto;text-align:right;}
.lsub span{display:block;font-size:10px;color:var(--soft);}
.lsub b{font-family:"Barlow Condensed";font-size:17px;font-weight:700;}
.lnote{margin-top:6px;}
.lnote input{font-size:13px;padding:6px 8px;}
/* SUMMARY */
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:14px;}
.sr .v{font-family:"Barlow Condensed";font-weight:700;font-size:16px;}
.sr.tot{border-top:2px dashed #cfc9bb;margin-top:6px;padding-top:9px;}
.sr.tot .lbl{font-weight:700;}
.sr.tot .v{font-size:24px;color:var(--sky);}
.seg{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.seg button{flex:1;min-width:78px;border:1.5px solid #d8d3c6;background:#fff;border-radius:7px;padding:7px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--soft);font-weight:600;}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.chk{display:flex;align-items:center;gap:7px;padding:6px 0;font-size:14px;cursor:pointer;}
.chk input{width:17px;height:17px;accent-color:var(--sky);flex:none;margin:0;}
.subo{display:none;margin:2px 0 4px 26px;}
.subo.show{display:block;}
.divider{border:none;border-top:1px dashed #d8d3c6;margin:10px 0;}
/* PREVIEW */
.preview{background:#060c14;color:#cfe8fc;border-radius:10px;padding:12px 13px;font-family:"Barlow","PingFang TC","Microsoft JhengHei",monospace;font-size:13px;line-height:1.75;white-space:pre-wrap;word-break:break-word;border:1px solid #1e3a5f;max-height:380px;overflow-y:auto;}
/* BAR */
.bar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:linear-gradient(180deg,#0d1520,#080d14);border-top:1px solid #1e3a5f;padding:9px 12px 13px;box-shadow:0 -6px 20px rgba(0,0,0,.4);}
.bi{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:center;}
.bi .tot{flex:1;}
.bi .tot small{display:block;color:#7dd3fc;font-size:10px;}
.bi .tot b{font-family:"Barlow Condensed";font-size:22px;color:#fff;}
.btn{border:none;border-radius:9px;padding:11px 15px;font-family:"Barlow Condensed";font-weight:700;font-size:16px;letter-spacing:.4px;cursor:pointer;color:#fff;background:linear-gradient(180deg,var(--red),var(--red-d));box-shadow:0 3px 0 #7d0a0e;transition:.08s;}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #7d0a0e;}
.btn.ghost{background:#1a2535;box-shadow:0 3px 0 #0a1020;color:#bae6fd;}
.btn.ok{background:linear-gradient(180deg,var(--sky),#0369a1);box-shadow:0 3px 0 #024e7c;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(14px);background:var(--ok);color:#fff;padding:9px 18px;border-radius:26px;font-weight:700;font-size:13.5px;opacity:0;pointer-events:none;transition:.22s;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.toast.err-t{background:#c0392b;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.cbadge{font-size:11px;background:var(--red);color:#fff;border-radius:16px;padding:2px 7px;font-weight:700;}
@media(max-width:480px){.grid{grid-template-columns:1fr;}.lsub{margin-left:0;width:100%;display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;}}
/* ORDER HISTORY */
.oh-panel{margin-top:10px;border-top:1px dashed #d8d3c6;padding-top:10px;}
.oh-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.oh-title b{font-size:13px;font-weight:700;}
.oh-title small{font-size:11px;color:var(--soft);}
.oh-card{background:#fff;border:1px solid #e6e1d4;border-radius:9px;padding:10px 11px;margin-bottom:7px;}
.oh-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.oh-meta{flex:1;}
.oh-date{font-family:"Barlow Condensed";font-weight:700;font-size:14px;}
.oh-num{font-size:10.5px;color:var(--soft);}
.oh-total{font-family:"Barlow Condensed";font-weight:700;font-size:17px;color:var(--sky);margin-left:8px;white-space:nowrap;}
.oh-items{font-size:11.5px;color:var(--soft);line-height:1.6;margin:5px 0 7px;}
.oh-foot{display:flex;align-items:center;justify-content:space-between;}
.oh-tags{display:flex;gap:5px;flex-wrap:wrap;}
.oh-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;background:#f0ede6;color:var(--soft);}
.oh-copy{border:none;background:linear-gradient(180deg,var(--sky),#0369a1);color:#fff;border-radius:7px;padding:6px 14px;font-family:"Barlow Condensed";font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 2px 0 #024e7c;white-space:nowrap;}
.oh-copy:active{transform:translateY(1px);}
.oh-loading,.oh-empty{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
</style>
</head>

  <!-- 1 -->
  <section id="s1">
    <div class="sh" onclick="tog('s1')"><span class="sn">1</span><h2>訂單資料</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <div class="grid">
        <label class="fld"><span>訂單日期</span><input type="date" id="oDate"></label>
        <label class="fld"><span>業務人員</span><input id="oRep" oninput="render()"></label>
      </div>
    </div>
  </section>

  <!-- 2 -->
  <section id="s2">
    <div class="sh" onclick="tog('s2')"><span class="sn">2</span><h2>客戶資料</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <div class="sbox" style="margin-bottom:7px;">
        <span class="sic">👤</span>
        <input id="custSrc" placeholder="搜尋客戶名稱或聯絡人…" oninput="searchCust()" autocomplete="off">
      </div>
      <div class="res" id="custRes"></div>
      <div class="divider"></div>
      <div class="trow"><label class="sw"><input type="checkbox" id="cNew" onchange="render()"><span class="sl"></span><span class="kn"></span></label><span>新客戶（顯示完整建檔欄位）</span></div>
      <div class="grid">
        <label class="fld full"><span>寶號 / 公司名稱</span><input id="cName" oninput="render()" placeholder="例：星光五金行"></label>
        <label class="fld"><span>統編</span><input id="cTax" oninput="render()" inputmode="numeric"></label>
        <label class="fld"><span>聯絡人</span><input id="cContact" oninput="render()"></label>
        <label class="fld"><span>聯絡電話</span><input id="cPhone" oninput="render()" inputmode="tel"></label>
        <label class="fld full"><span>公司電話</span><input id="cTel" oninput="render()" inputmode="tel"></label>
                <div id="addrSelWrap" style="display:none;margin-bottom:4px;">
          <label class="fld">
            <span>📍 選擇此筆訂單的送貨地址</span>
            <select id="addrSel" onchange="onAddrSel()"></select>
          </label>
        </div>
        <label class="fld full"><span>送貨地址</span><input id="cAddr1" oninput="render()"></label>
        <label class="fld full"><span>備用地址</span><input id="cAddr2" oninput="render()"></label>
        <label class="fld full"><span>備用欄位</span><input id="cAddr3" oninput="render()"></label>
      </div>
      <div id="ohPanel" class="oh-panel" style="display:none">
        <div class="oh-title"><b>📋 訂單紀錄</b><small id="ohCount"></small></div>
        <div id="ohList"><div class="oh-loading">載入中…</div></div>
      </div>
            <div style="text-align:right;margin-top:9px;">
        <button class="btn ghost" style="font-size:13px;padding:8px 15px;" onclick="saveCustomer()">💾 儲存此客戶</button>
      </div>
    </div>
  </section>

  <!-- 3 -->
  <section id="s3">
    <div class="sh" onclick="tog('s3')"><span class="sn">3</span><h2>加入商品</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <p class="hint">輸入型號片段或品名關鍵字（例：<b>FPD3</b>、<b>鎚鑽</b>、<b>砂輪</b>）</p>
      <div class="sbox"><span class="sic">🔍</span><input id="prodSrc" placeholder="搜尋型號或品名…" oninput="searchProd()" autocomplete="off"></div>
      <div class="res" id="prodRes"></div>
    </div>
  </section>

  <!-- 4 -->
  <section id="s4">
    <div class="sh" onclick="tog('s4')"><span class="sn">4</span><h2>訂單內容</h2><span class="cbadge" id="cartCnt">0</span><span style="flex:1"></span><span class="chev">▼</span></div>
    <div class="sec-body">
      <div id="cartWrap"></div>
      <div class="empty" id="cartEmpty">尚未加入商品</div>
    </div>
  </section>

  <!-- 5 -->
  <section id="s5">
    <div class="sh" onclick="tog('s5')"><span class="sn">5</span><h2>發票 + 貨款</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <div class="trow" style="margin-bottom:3px;"><label class="sw"><input type="checkbox" id="taxOn" checked onchange="render()"><span class="sl"></span><span class="kn"></span></label><span id="taxLabel">報價為<b>未稅</b>，外加 5%（開啟加稅／關閉免稅）</span></div>
      <div class="sr"><span>未稅小計</span><span class="v" id="sNet">$0</span></div>
      <div class="sr"><span>稅額(5%)</span><span class="v" id="sTax">$0</span></div>
      <div class="sr tot"><span class="lbl">稅後總額</span><span class="v" id="sTotal">$0</span></div>
      <div style="margin-top:12px;"><span style="font-size:11px;font-weight:600;color:var(--soft);display:block;margin-bottom:4px;">客戶付款方式</span>
        <div class="seg" id="paySeg">
          <button class="on" data-pay="現金" onclick="pickPay(this)">現金</button>
          <button data-pay="匯款" onclick="pickPay(this)">匯款</button>
          <button data-pay="支票" onclick="pickPay(this)">支票</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 6 -->
  <section id="s6" class="collapsed">
    <div class="sh" onclick="tog('s6')"><span class="sn">6</span><h2>備註 / 出貨</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <label class="chk"><input type="checkbox" id="nDep" onchange="render()"> 已收訂金</label>
      <label class="chk"><input type="checkbox" id="nShip" onchange="render()"> 已出貨</label>
      <label class="chk"><input type="checkbox" id="nStock" onchange="toggleStock()"> 缺貨處理</label>
      <div class="subo" id="stockOpt">
        <div class="seg">
          <button class="on" data-st="貨到客戶自取" onclick="pickStock(this)">客戶自取</button>
          <button data-st="貨到業務自送" onclick="pickStock(this)">業務自送</button>
          <button data-st="貨到郵寄" onclick="pickStock(this)">郵寄</button>
        </div>
        <label class="fld" style="margin-top:7px;"><span>請誰調撥</span><input id="nAllot" oninput="render()"></label>
      </div>
      <label class="fld" style="margin-top:8px;"><span>其他備註</span><textarea id="nFree" oninput="render()"></textarea></label>
    </div>
  </section>

  <!-- 7 -->
  <section id="s7">
    <div class="sh" onclick="tog('s7')"><span class="sn">★</span><h2>Line 訂單預覽</h2><span class="chev">▼</span></div>
    <div class="sec-body">
      <div class="preview" id="preview"></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        <button class="btn ghost" style="flex:1;min-width:90px;font-size:15px;" onclick="clearAll()">🗑 清空</button>
        <button class="btn ghost" style="flex:1;min-width:90px;font-size:15px;" onclick="copyOrder()">📋 複製</button>
        <button class="btn ok" style="flex:2;min-width:130px;font-size:15px;" id="submitBtn" onclick="submitOrder()">✅ 送出訂單</button>
      </div>
    </div>
  </section>
</div>
</div>

<div class="bar" style="display:none" id="mainBar">
  <div class="bi">
    <div class="tot"><small>稅後總額</small><b id="barTotal">$0</b></div>
    <button class="btn ghost" onclick="shareOrder()">↗ 分享</button>
    <button class="btn ok" id="barSubmit" onclick="submitOrder()">✅ 送出</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzGgh1vzwOrMB92U8cYXTDAyUf8EqQ3ksFgN_QSsonbPB7ugO2r0WMur82Q3gP4AJiruA/exec';
const PRICE_ALL=['飛魚','益昌官網','蝦皮中崙','momo中崙','酷彭','進貨價','自訂'];
const PRICE_STD=['飛魚','自訂'];

let token=null,sessionUser=null;
let PRODUCTS=[],CUSTOMERS=[];
let cart=[],pay='現金',stockMode='貨到客戶自取';
let _did='';

/* helpers */
const $=id=>document.getElementById(id);
const fmt=n=>'$'+Number(n||0).toLocaleString('en-US');
const norm=s=>(s||'').toLowerCase().replace(/[\s\-_]/g,'');
const cv=id=>$(id).value.trim();
function genId(){return 'xxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function safeLoad(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}

/* screens */
function showLogin(msg=''){$('loginScreen').style.display='flex';$('loadScreen').style.display='none';$('mainApp').style.display='none';$('mainBar').style.display='none';$('lErr').textContent=msg;$('lBtn').textContent='登入';$('lBtn').disabled=false;}
function showLoad(msg='載入中…'){$('loadScreen').style.display='flex';$('loginScreen').style.display='none';$('loadMsg').textContent=msg;}
function showApp(){$('mainApp').style.display='block';$('mainBar').style.display='block';$('loginScreen').style.display='none';$('loadScreen').style.display='none';}

/* API */
async function apiPost(data){
  try{
    const url=new URL(SCRIPT_URL);
    url.searchParams.set('payload',JSON.stringify(data));
    const r=await fetch(url.toString());
    return await r.json();
  }catch(e){return{ok:false,err:'網路連線失敗：'+e.message};}
}
async function apiGet(action,params={}){
  try{const u=new URL(SCRIPT_URL);u.searchParams.set('action',action);u.searchParams.set('token',token);
  Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u.toString());const d=await r.json();
  if(!d.ok&&d.err==='請重新登入'){showLogin('登入已過期，請重新登入');return d;}
  return d;}catch(e){return{ok:false,err:'網路連線失敗'};}
}

/* init */
async function init(){
  _did=localStorage.getItem('xf_did')||'';
  if(!_did){_did=genId();localStorage.setItem('xf_did',_did);}
  // warm up Apps Script in background
  fetch(SCRIPT_URL+'?action=ping',{mode:'no-cors'}).catch(()=>{});
  // check saved session
  const sess=safeLoad('xf_sess');
  if(sess&&sess.longToken&&sess.expiry>Date.now()){
    showLoad('驗證登入狀態…');
    const res=await apiPost({action:'verifyLong',longToken:sess.longToken,deviceId:_did});
    if(res.ok){
      token=res.token;
      sessionUser={username:sess.username,name:sess.name,role:sess.role,code:sess.code||''};
      onLoggedIn();
      await loadData();
      showApp();
      return;
    }
    localStorage.removeItem('xf_sess');
  }
  showLogin();
}

function onLoggedIn(){
  $('hName').textContent=sessionUser.name;
  const labels={'管理員':'管理員','正式帳號':'正式','測試帳號':'測試'};
  const cls={'管理員':'r-admin','正式帳號':'r-rep','測試帳號':'r-trial'};
  $('hRole').textContent=labels[sessionUser.role]||sessionUser.role;
  $('hRole').className='rtag '+(cls[sessionUser.role]||'r-trial');
  
  $('oRep').value=sessionUser.name;
  initDate();render();
}

async function doLogin(){
  const u=cv('lUser'),p=cv('lPwd');
  if(!u||!p){$('lErr').textContent='請輸入帳號和密碼';return;}
  $('lBtn').disabled=true;$('lBtn').textContent='登入中…';$('lErr').textContent='';
  const res=await apiPost({action:'login',username:u,password:p,deviceId:_did});
  if(!res.ok){$('lErr').textContent=res.err||'登入失敗';$('lBtn').disabled=false;$('lBtn').textContent='登入';return;}
  token=res.token;
  sessionUser={username:res.username,name:res.name,role:res.role,code:res.code||''};
  if(res.longToken&&res.role!=='測試帳號'){
    localStorage.setItem('xf_sess',JSON.stringify({longToken:res.longToken,username:res.username,name:res.name,role:res.role,code:res.code||'',expiry:Date.now()+7*86400000}));
  }
  onLoggedIn();showLoad('載入資料中…');
  await loadData();showApp();
}

function doLogout(){
  if(!confirm('確定登出？'))return;
  localStorage.removeItem('xf_sess');
  token=null;sessionUser=null;PRODUCTS=[];CUSTOMERS=[];cart=[];
  ['cName','cTax','cContact','cPhone','cTel','cAddr1','cAddr2','cAddr3','nAllot','nFree','prodSrc','custSrc'].forEach(id=>$(id).value='');
  $('custRes').innerHTML='';$('prodRes').innerHTML='';
  $('cNew').checked=false;$('nDep').checked=false;$('nShip').checked=false;$('nStock').checked=false;
  $('stockOpt').classList.remove('show');
  $('s8').style.display='none';
  showLogin();
}

$('lPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function loadData(){
  const[pr,cr]=await Promise.all([apiGet('products'),apiGet('customers')]);
  if(pr.ok){PRODUCTS=pr.data||[];}
  if(cr.ok){CUSTOMERS=cr.data||[];if($('custTotal'))$('custTotal').textContent=CUSTOMERS.length;}
}

/* UI */
function tog(id){$(id).classList.toggle('collapsed');}
function initDate(){const d=new Date();$('oDate').value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

/* customer */
function searchCust(){
  const q=norm($('custSrc').value);const box=$('custRes');
  if(!q){box.innerHTML='';return;}
  const hits=CUSTOMERS.filter(c=>norm(c['公司名稱']||'').includes(q)||norm(c['聯絡人']||'').includes(q)).slice(0,12);
  if(!hits.length){box.innerHTML='<div class="empty">找不到，請手動填寫後按儲存</div>';return;}
  box.innerHTML=hits.map(c=>{const idx=CUSTOMERS.indexOf(c);
    return`<div class="ri" onclick="pickCust(${idx})"><div class="rm"><div class="rmod">${c['公司名稱']||''}</div><div class="rname">${c['聯絡人']||''}${c['聯絡電話']?' · '+c['聯絡電話']:''}</div></div><div class="radd">→</div></div>`;
  }).join('');
}
function pickCust(idx){
  const c=CUSTOMERS[idx];
  $('cName').value=c['公司名稱']||'';$('cTax').value=c['統一編號']||'';
  $('cContact').value=c['聯絡人']||'';$('cPhone').value=c['聯絡電話']||'';
  $('cTel').value=c['公司電話']||'';$('cAddr1').value=c['送貨地址']||'';
  $('cAddr2').value=c['備用地址']||'';$('cAddr3').value=c['備用欄位']||'';
  $('custSrc').value='';$('custRes').innerHTML='';
  updateAddrSel(c);
  render();flash('已帶入：'+c['公司名稱']);
  loadCustOrders(c['公司名稱']||'');
}

/* ── 地址下拉選單 ── */
function updateAddrSel(c){
  const raw=[
    {l:'送貨地址', v:(c['送貨地址']||'').trim()},
    {l:'備用地址', v:(c['備用地址']||'').trim()},
    {l:'備用欄位', v:(c['備用欄位']||'').trim()}
  ].filter(a=>a.v);
  const wrap=$('addrSelWrap'), sel=$('addrSel');
  if(raw.length>1){
    sel.innerHTML=raw.map(a=>`<option value="${a.v.replace(/"/g,'&quot;')}">${a.l}：${a.v}</option>`).join('');
    sel.value=raw[0].v;
    wrap.style.display='';
  }else{
    wrap.style.display='none';
  }
  render();
}
function onAddrSel(){render();}
function getSelectedAddr(){
  if($('addrSelWrap').style.display!=='none') return $('addrSel').value;
  return cv('cAddr1');
}

/* ── 客戶訂單紀錄 ── */


function buildOrderCard(o, idx) {
  const date = o['訂單日期'] || '';
  const num  = o['訂單編號'] || '';
  const total = Number(o['稅後總額'] || 0).toLocaleString('en-US');
  const pay  = o['付款方式'] || '';
  const ship = o['出貨狀態'] || '';
  const recv = o['收款狀態'] || '';
  // 品項摘要（最多3行）
  const itemText = String(o['品項'] || '').split('\n').filter(l => l.trim() && /^\d+\./.test(l.trim())).slice(0, 3).join('\n');
  const hasJson = o['品項JSON'] && o['品項JSON'] !== '[]';
  const dataStr = encodeURIComponent(JSON.stringify(o));
  return `<div class="oh-card">
    <div class="oh-head">
      <div class="oh-meta">
        <div class="oh-date">${date}</div>
        <div class="oh-num">${num}・業務 ${o['業務姓名']||''}</div>
      </div>
      <div class="oh-total">$${total}</div>
    </div>
    <div class="oh-items">${itemText || '（無品項資料）'}</div>
    <div class="oh-foot">
      <div class="oh-tags">
        ${pay ? `<span class="oh-tag">${pay}</span>` : ''}
        ${ship ? `<span class="oh-tag">${ship}</span>` : ''}
        ${recv ? `<span class="oh-tag">${recv}</span>` : ''}
      </div>
      ${hasJson
        ? `<button class="oh-copy" onclick="copyOrderToCart(${idx})">複製此訂單</button>`
        : `<span style="font-size:10.5px;color:var(--muted)">舊格式無法複製</span>`}
    </div>
  </div>`;
}

// 儲存當次查詢結果供複製用
let _lastOrders = [];

async function loadCustOrders(customerName) {
  if (!customerName) return;
  $('ohPanel').style.display = 'block';
  $('ohList').innerHTML = '<div class="oh-loading">載入訂單紀錄…</div>';
  $('ohCount').textContent = '';
  const res = await apiPost({ action: 'ordersByCustomer', token, customer: customerName });
  if (!res.ok) { $('ohList').innerHTML = `<div class="oh-empty">載入失敗：${res.err}</div>`; return; }
  _lastOrders = res.data || [];
  $('ohCount').textContent = `共 ${_lastOrders.length} 筆`;
  if (!_lastOrders.length) { $('ohList').innerHTML = `<div class="oh-empty">此客戶目前無訂單紀錄<br><span style="font-size:11px;color:#aaa">（查詢：${customerName}）</span></div>`; return; }
  $('ohList').innerHTML = _lastOrders.map((o, i) => buildOrderCard(o, i)).join('');
}

function copyOrderToCart(idx) {
  const o = _lastOrders[idx];
  if (!o) return;
  let items = [];
  try { items = JSON.parse(o['品項JSON'] || '[]'); } catch(e) { items = []; }
  if (!items.length) { flash('此訂單無品項資料，無法複製', 'err'); return; }
  // 重建購物車
  cart = items.map(item => {
    const p = PRODUCTS.find(x => x['型號'] === item.model) || {
      '編號': '', '型號': item.model, '品名': item.name, '飛魚': item.price
    };
    return { key: Date.now() + Math.random(), p, qty: item.qty, unit: item.unit || '台', src: '自訂', price: Number(item.price) || 0, note: item.note || '' };
  });
  // 帶入付款方式
  const payBtn = document.querySelector(`#paySeg button[data-pay="${o['付款方式']}"]`);
  if (payBtn) pickPay(payBtn);
  // 關閉紀錄面板、展開訂單內容
  $('ohPanel').style.display = 'none';
  $('s4').classList.remove('collapsed');
  render();
  flash(`✅ 已複製 ${items.length} 筆品項，請確認後修改`);
  setTimeout(() => $('s4').scrollIntoView({ behavior: 'smooth' }), 100);
}
async function saveCustomer(){
  const name=cv('cName');if(!name){flash('請填寫公司名稱','err');return;}
  const c={name,tax:cv('cTax'),contact:cv('cContact'),phone:cv('cPhone'),tel:cv('cTel'),addr1:cv('cAddr1'),addr2:cv('cAddr2'),addr3:cv('cAddr3'),repName:sessionUser?.name||''};
  const res=await apiPost({action:'saveCustomer',token,customer:c});
  if(res.ok){
    const obj={'公司名稱':c.name,'統一編號':c.tax,'聯絡人':c.contact,'聯絡電話':c.phone,'公司電話':c.tel,'送貨地址':c.addr1,'備用地址':c.addr2,'備用欄位':c.addr3,'負責業務':c.repName};
    const idx=CUSTOMERS.findIndex(x=>norm(x['公司名稱'])===norm(c.name)&&norm(x['聯絡人'])===norm(c.contact));
    if(idx>=0)CUSTOMERS[idx]=obj;else CUSTOMERS.push(obj);
    if($('custTotal'))$('custTotal').textContent=CUSTOMERS.length;
    flash('✅ 已儲存：'+c.name);
  }else flash('儲存失敗：'+(res.err||'請稍後再試'),'err');
}

/* product */
function searchProd(){
  const q=norm($('prodSrc').value);const box=$('prodRes');
  if(!q){box.innerHTML='';return;}
  const hits=PRODUCTS.filter(p=>norm(p['型號']||'').includes(q)||norm(p['品名']||'').includes(q)||String(p['編號'])===q).slice(0,40);
  if(!hits.length){box.innerHTML='<div class="empty">找不到，換個關鍵字試試</div>';return;}
  const role=sessionUser?.role;
  box.innerHTML=hits.map(p=>{
    const prices=[];
    if(p['飛魚']!=null)prices.push(`飛魚 <b>${fmt(p['飛魚'])}</b>`);
    if(role==='管理員'){['益昌官網','蝦皮中崙','momo中崙','酷彭','進貨價'].forEach(k=>{if(p[k]!=null)prices.push(`<span class="ref">${k} ${fmt(p[k])}</span>`);});}
    const w=p['備註']?`<span style="font-size:10px;color:var(--warn)"> ⚠${p['備註']}</span>`:'';
    return`<div class="ri" onclick="addItem('${p['編號']}')"><div class="rm"><div><span class="rmod">${p['型號']||''}</span><span class="rid">#${p['編號']}</span></div><div class="rname">${p['品名']||''}</div><div class="rprice">${prices.join('　')||'需詢價'}${w}</div></div><div class="radd">＋</div></div>`;
  }).join('');
}
function addItem(id){
  const p=PRODUCTS.find(x=>String(x['編號'])===String(id));if(!p)return;
  const price=Number(p['飛魚'])||0;
  cart.push({key:Date.now()+Math.random(),p,qty:1,unit:'台',src:'飛魚',price,note:''});
  $('prodSrc').value='';$('prodRes').innerHTML='';
  if($('s4').classList.contains('collapsed'))$('s4').classList.remove('collapsed');
  render();flash('已加入：'+p['型號']);
}

/* cart */
function removeItem(key){cart=cart.filter(i=>i.key!==key);render();}
function chgQty(key,d){const i=cart.find(x=>x.key===key);if(!i)return;i.qty=Math.max(1,i.qty+d);render();}
function setQty(key,v){const i=cart.find(x=>x.key===key);if(!i)return;i.qty=Math.max(1,parseInt(v)||1);render();}
function setUnit(key,v){const i=cart.find(x=>x.key===key);if(i){i.unit=v||'台';render();}}
function setSrc(key,v){const i=cart.find(x=>x.key===key);if(!i)return;i.src=v;if(v!=='自訂'){const pv=i.p[v];i.price=Number(pv)||0;}render();}
function setPrice(key,v){const i=cart.find(x=>x.key===key);if(!i)return;i.price=Math.max(0,parseInt(v)||0);i.src='自訂';render();}
function setNote(key,v){const i=cart.find(x=>x.key===key);if(i){i.note=v;}renderPreview();}

/* calc */
function calc(){const net=cart.reduce((a,i)=>a+i.price*i.qty,0);const on=$('taxOn').checked;const sub=net,tax=on?Math.round(net*.05):0,total=sub+tax;return{sub,tax,total};}
function pickPay(b){document.querySelectorAll('#paySeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');pay=b.dataset.pay;render();}
function pickStock(b){b.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');stockMode=b.dataset.st;render();}
function toggleStock(){$('stockOpt').classList.toggle('show',$('nStock').checked);render();}

/* render */
function render(){
  const role=sessionUser?.role;
  const srcOpts=role==='管理員'?PRICE_ALL:PRICE_STD;
  $('cartCnt').textContent=cart.length;
  $('cartEmpty').style.display=cart.length?'none':'block';
  $('cartWrap').innerHTML=cart.map((i,idx)=>{
    const opts=srcOpts.map(s=>{const av=s==='自訂'||i.p[s]!=null;return`<option value="${s}" ${i.src===s?'selected':''} ${av?'':'disabled'}>${s}</option>`;}).join('');
    return`<div class="line"><div class="ltop"><div class="linfo"><div class="lmod">${idx+1}. ${i.p['型號']||''} <span class="rid">#${i.p['編號']}</span></div><div class="lnm">${i.p['品名']||''}</div></div><button class="del" onclick="removeItem(${i.key})">✕</button></div>
    <div class="ctrl">
      <div class="mini"><span>數量</span><div class="qty"><button onclick="chgQty(${i.key},-1)">−</button><input type="number" value="${i.qty}" min="1" onchange="setQty(${i.key},this.value)"><button onclick="chgQty(${i.key},1)">＋</button></div></div>
      <div class="mini"><span>單位</span><input class="uin" value="${i.unit}" onchange="setUnit(${i.key},this.value)"></div>
      <div class="mini"><span>價別</span><select class="ssel" onchange="setSrc(${i.key},this.value)">${opts}</select></div>
      <div class="mini"><span>單價</span><input class="pin" type="number" value="${i.price}" onchange="setPrice(${i.key},this.value)"></div>
      <div class="lsub"><span>小計</span><b>${fmt(i.price*i.qty)}</b></div>
    </div>
    <div class="lnote"><input value="${i.note.replace(/"/g,'&quot;')}" placeholder="內含 / 備註" oninput="setNote(${i.key},this.value)"></div></div>`;
  }).join('');
  const c=calc();
  $('sNet').textContent=fmt(c.sub);$('sTax').textContent=fmt(c.tax);$('sTotal').textContent=fmt(c.total);
  $('barTotal').textContent=fmt(c.total);
  renderPreview();
}

/* text */
function buildNotes(){const ns=[];if($('nDep').checked)ns.push('已收訂金');if($('nShip').checked)ns.push('已出貨');if($('nStock').checked){let s='缺貨：'+stockMode;const a=cv('nAllot');if(a)s+='；請 '+a+' 調撥';ns.push(s);}const f=cv('nFree');if(f)ns.push(f);return ns.join('；');}
function buildText(){
  const c=calc();
  const date=$('oDate').value?$('oDate').value.replace(/-/g,'/'):'';
  const isNew=$('cNew').checked;
  const cl=(l,v)=>(isNew||v)?l+'：'+v+'\n':'';
  let t='1.[訂單日期和業務人員]\n';
  t+=`訂單日期：${date}\n業務人員：${cv('oRep')}\n\n`;
  t+='2.[新客戶建檔]\n';
  t+=cl('寶號',cv('cName'));t+=cl('統編',cv('cTax'));t+=cl('聯絡人',cv('cContact'));
  t+=cl('聯絡電話',cv('cPhone'));t+=cl('公司電話',cv('cTel'));
  const addr=getSelectedAddr();
  if(isNew||addr) t+=`地址：${addr}\n`;
  t+='\n3.[訂單內容]\n';
  if(!cart.length)t+='（尚未加入商品）\n';
  cart.forEach((i,idx)=>{
    t+=`${idx+1}. ${i.p['型號']}　${i.p['品名']||''}　${Number(i.price).toLocaleString('en-US')}元　${i.qty}${i.unit}　小計 ${(i.price*i.qty).toLocaleString('en-US')}元\n`;
    if(i.note.trim())t+=`   (${i.note.trim()})\n`;
    t+='\n';
  });
  t+=`4.[發票+貨款資訊]\n`;
  t+=`未稅小計：${c.sub.toLocaleString('en-US')} 元\n`;
  if(c.tax>0) t+=`稅額(5%)：${c.tax.toLocaleString('en-US')} 元\n`;
  t+=`稅後總額：${c.total.toLocaleString('en-US')} 元\n客戶付款方式：${pay}\n\n`;
  t+=`5.備註：\n`;
  const ns=buildNotes();t+=ns?ns+'\n':'（無）\n';
  return t;
}
function renderPreview(){$('preview').textContent=buildText();}

/* submit */
async function submitOrder(){
  if(!cart.length){flash('請先加入商品','err');return;}
  if(!cv('cName')){flash('請填寫客戶名稱','err');return;}
  const btns=[$('submitBtn'),$('barSubmit')];
  btns.forEach(b=>{b.disabled=true;b.textContent='送出中…';});
  const c=calc();
  const res=await apiPost({action:'saveOrder',token,orderDate:$('oDate').value.replace(/-/g,'/'),
    customer:{name:cv('cName'),tax:cv('cTax'),contact:cv('cContact'),phone:cv('cPhone'),tel:cv('cTel'),addr1:cv('cAddr1'),addr2:cv('cAddr2'),addr3:cv('cAddr3')},
    items:cart.map(i=>({model:i.p['型號']||'',name:i.p['品名']||'',qty:i.qty,unit:i.unit,price:i.price,note:i.note})),
    subtotal:c.sub,tax:c.tax,total:c.total,payment:pay,notes:buildNotes()
  });
  btns.forEach(b=>{b.disabled=false;});$('submitBtn').textContent='✅ 送出訂單';$('barSubmit').textContent='✅ 送出';
  if(res.ok){flash(`✅ 訂單送出！編號：${res.orderNum}`);if(confirm(`訂單 ${res.orderNum} 送出成功！\n要清空訂單開始下一張嗎？`))clearAll();}
  else flash('❌ 送出失敗：'+(res.err||'請稍後再試'),'err');
}

/* copy/share */
function copyOrder(){const t=buildText();if(navigator.clipboard?.writeText)navigator.clipboard.writeText(t).then(()=>flash('已複製！'),()=>fbCopy(t));else fbCopy(t);}
function fbCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');flash('已複製！');}catch(e){flash('請手動長按複製');}document.body.removeChild(ta);}
function shareOrder(){if(navigator.share)navigator.share({text:buildText()}).catch(()=>{});else copyOrder();}
function clearAll(){
  if(!confirm('確定清空整張訂單？'))return;cart=[];
  ['cName','cTax','cContact','cPhone','cTel','cAddr1','cAddr2','cAddr3','nAllot','nFree','prodSrc','custSrc'].forEach(id=>$(id).value='');
  $('custRes').innerHTML='';$('prodRes').innerHTML='';
  $('cNew').checked=false;$('nDep').checked=false;$('nShip').checked=false;$('nStock').checked=false;
  $('stockOpt').classList.remove('show');
  // 清空地址下拉
  $('addrSelWrap').style.display='none';
  $('addrSel').innerHTML='';
  // 清空訂單紀錄面板
  $('ohPanel').style.display='none';
  $('ohList').innerHTML='';
  $('ohCount').textContent='';
  _lastOrders=[];
  render();
}

/* CSV */
function exportProdCSV(){if(!PRODUCTS.length){flash('產品未載入','err');return;}const ks=Object.keys(PRODUCTS[0]);const hdr=ks.join(',')+',';const rows=PRODUCTS.map(p=>ks.map(k=>'"'+String(p[k]??'').replace(/"/g,'""')+'"').join(',')).join('\n');dl(new Blob(['\uFEFF'+hdr+'\n'+rows],{type:'text/csv'}),'產品總表.csv');}
function exportCustCSV(){if(!CUSTOMERS.length){flash('客戶未載入','err');return;}const ks=Object.keys(CUSTOMERS[0]);const hdr=ks.join(',');const rows=CUSTOMERS.map(c=>ks.map(k=>'"'+String(c[k]??'').replace(/"/g,'""')+'"').join(',')).join('\n');dl(new Blob(['\uFEFF'+hdr+'\n'+rows],{type:'text/csv'}),'客戶資料.csv');}
function dl(b,n){const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);}

/* toast */
let tt;
function flash(msg,type=''){const el=$('toast');el.textContent=msg;el.className='toast'+(type==='err'?' err-t':'');el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2400);}

init();
</script>
</body>
</html>
